<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTS 2026 - RULES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --danger: #d93025; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; }

        /* AREA PDF */
        .pdf-container { width: 100%; height: 100vh; background: #525659; position: relative; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* FLOATING BUTTON */
        #btn-toggle-panel {
            position: fixed; bottom: 20px; right: 20px; z-index: 999;
            background: var(--danger); color: white; border: none; padding: 15px 25px;
            border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; display: none;
        }

        /* PANEL JAWABAN SLIDE-UP */
        .sidebar {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh;
            background: white; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        .sidebar.open { bottom: 0; }

        .panel-handle { width: 100%; height: 40px; background: #f1f3f4; border-radius: 25px 25px 0 0; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .handle-bar { width: 40px; height: 4px; background: #ccc; border-radius: 2px; }

        /* NAVIGASI NOMER */
        .nav-grid { display: flex; overflow-x: auto; padding: 10px; gap: 8px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-btn { min-width: 42px; height: 42px; background: #f1f3f4; border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex: 0 0 auto; font-size: 14px; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.filled { background: #34a853; color: white; border-color: #2d9249; }

        /* JAWABAN */
        .jawaban-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .options { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .opt-btn { flex: 1; padding: 18px; border: 2px solid #ddd; border-radius: 12px; text-align: center; font-weight: bold; font-size: 20px; background: #fff; transition: 0.2s; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* LOGIN & RESULT OVERLAY */
        #login-overlay, #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-green { background: #1e8e3e; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-green:disabled { background: #ccc; cursor: not-allowed; }

        .score-box { font-size: 60px; font-weight: bold; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="text-align:center; color:var(--primary); margin-top:0;">PTS 2026 - RULES</h2>
        <div id="box-login">
            <input type="number" id="input-nis" placeholder="Lebetkeun NIS...">
            <button class="btn-green" onclick="cekSiswa()" id="btn-cek">LOGIN</button>
        </div>
        <div id="box-konfirmasi" style="display:none; text-align:center;">
            <p>Wilujeng sumping, <br><b id="txt-nami" style="font-size:18px;"></b></p>
            <select id="mapel" onchange="$('#btn-mulai').prop('disabled', false)">
                <option value="">-- Pilih Mapel --</option>
                <option value="SUNDA">Basa Sunda</option>
                <option value="SENI">Seni Budaya</option>
            </select>
            <button id="btn-mulai" class="btn-green" disabled onclick="mulaiUjian()" style="margin-top:20px;">MIMITIAN UJIAN</button>
        </div>
    </div>

    <div id="result-overlay" style="display:none; text-align:center;">
        <h2>UJIAN RENGSE!</h2>
        <p>Hatur nuhun, <b id="res-nami"></b></p>
        <div class="score-box" id="res-nilai">0</div>
        <p id="res-msg"></p>
        <button class="btn-green" onclick="location.reload()">KALUAR</button>
    </div>

    <div class="pdf-container">
        <iframe id="pdf-viewer"></iframe>
    </div>

    <button id="btn-toggle-panel" onclick="togglePanel()">📝 EUSI JAWABAN</button>

    <div class="sidebar" id="panel-jawaban">
        <div class="panel-handle" onclick="togglePanel()"><div class="handle-bar"></div></div>
        <div class="nav-grid" id="nav-grid"></div>
        <div class="jawaban-area" id="jawaban-area"></div>
        <div style="padding: 10px 20px 20px;">
            <p id="msg-warning" style="color:red; font-size:11px; text-align:center; margin-bottom:5px;"></p>
            <button onclick="kirimJawaban()" id="btn-submit" class="btn-green" disabled>KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPw-5z_k6simejXhQarFcNYbP07_rSxQvAhOR8Cucv2k5qJo5gcce4Nx7i8j7XKcchNQ/exec";
        let dataMurid = {}, cheatCount = 0, totalSoal = 25;

        function cekSiswa() {
            const nis = $('#input-nis').val();
            if(!nis) return alert("Eusian NIS!");
            $('#btn-cek').prop('disabled', true).text("Mariksa...");
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + nis, function(res) {
                if(res.found) {
                    dataMurid = res; dataMurid.nis = nis;
                    $('#box-login').hide(); $('#txt-nami').text(res.nami); $('#box-konfirmasi').show();
                } else {
                    alert("NIS Teu Kapendak!"); $('#btn-cek').prop('disabled', false).text("LOGIN");
                }
            });
        }

        function mulaiUjian() {
            const mp = $('#mapel').val();
            $('#login-overlay').fadeOut();
            $('#btn-toggle-panel').show();
            
            const pdfUrl = window.location.origin + window.location.pathname.replace('index.html', '') + `pdf/${mp}.pdf`;
            $('#pdf-viewer').attr('src', `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`);

            let navH = '', soalH = '';
            for(let i=1; i<=totalSoal; i++) {
                navH += `<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`;
                soalH += `<div class="soal-box" id="s-${i}" style="display:none; width:100%; text-align:center;">
                            <h3 style="margin:0 0 15px 0;">SOAL NOMER ${i}</h3>
                            <div class="options">
                                <div class="opt-btn" onclick="pilih(${i},'A')">A</div>
                                <div class="opt-btn" onclick="pilih(${i},'B')">B</div>
                                <div class="opt-btn" onclick="pilih(${i},'C')">C</div>
                                <div class="opt-btn" onclick="pilih(${i},'D')">D</div>
                                <div class="opt-btn" onclick="pilih(${i},'E')">E</div>
                            </div>
                         </div>`;
            }
            $('#nav-grid').html(navH); $('#jawaban-area').html(soalH);
            buka(1);
        }

        function togglePanel() { $('#panel-jawaban').toggleClass('open'); }

        function buka(n) {
            $('.nav-btn').removeClass('active'); $('.soal-box').hide();
            $(`#n-${n}`).addClass('active'); $(`#s-${n}`).show();
            document.getElementById(`n-${n}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function pilih(n, abjad) {
            $(`#s-${n} .opt-btn`).removeClass('selected');
            $(`#s-${n} .opt-btn:contains('${abjad}')`).addClass('selected');
            $(`#n-${n}`).addClass('filled');
            checkCompletion();
            if(n < totalSoal) { setTimeout(() => { togglePanel(); buka(n + 1); }, 400); }
        }

        function checkCompletion() {
            const filled = $('.nav-btn.filled').length;
            if(filled === totalSoal) {
                $('#btn-submit').prop('disabled', false);
                $('#msg-warning').text("");
            } else {
                $('#msg-warning').text("Lengkepan sadaya jawaban (tombol héjo sadaya) nembe tiasa Submit!");
            }
        }

        // ANTI-CONTEK DETECTION
        window.onblur = function() {
            if(!$('#login-overlay').is(':visible') && !$('#result-overlay').is(':visible')) {
                cheatCount++;
                alert("PERHATOSAN: Anjeun kadeteksi muka tab sanés! Gerak-gerik anjeun kacatet ku guru.");
            }
        };

        function kirimJawaban() {
            if(!confirm("Yakin bade dikirim? Nilai moal tiasa dirobih deui.")) return;
            let jwb = "";
            for(let i=1; i<=totalSoal; i++) { jwb += $(`#s-${i} .opt-btn.selected`).text() || "-"; }
            
            $('#btn-submit').prop('disabled', true).text("Nuju Ngirim...");
            
            $.post(SCRIPT_URL, {
                nami: dataMurid.nami, nis: dataMurid.nis, kelas: dataMurid.kelas,
                mapel: $('#mapel').val(), jawaban: jwb, cheat: cheatCount, status: "Selesai"
            }, function(res) {
                $('#res-nami').text(dataMurid.nami);
                $('#res-nilai').text(res.nilai || "75"); // Munculkeun nilai ti server
                $('#res-msg').text(`Jumlah Pindah Tab: ${cheatCount} kali.`);
                $('#result-overlay').fadeIn();
            });
        }
    </script>
</body>
</html>
