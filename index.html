<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTEM UJIAN PTS 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a73e8; 
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --danger: #ff0000;
            --success: #1e8e3e;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }

        /* --- LOGIN SCREEN --- */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient); z-index: 2001; padding: 20px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px; border-radius: 20px;
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        input[type="number"], select {
            width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #ddd;
            border-radius: 12px; font-size: 16px; outline: none; text-align: center;
        }
        .btn-pro {
            background: var(--primary); color: white; border: none; padding: 18px;
            width: 100%; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer;
        }

        /* --- NOTIFIKASI PELANGGARAN PERMANENT --- */
        #notif-pelanggaran {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--danger);
            color: white; text-align: center; padding: 10px; font-weight: bold;
            z-index: 3000; display: none; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* --- PDF AREA (OPTIMIZED) --- */
        .pdf-container { width: 100%; height: 100vh; background: #333; position: absolute; top:0; left:0; z-index: 1; }
        embed, iframe { width: 100%; height: 100%; border: none; }

        /* --- PANEL JAWABAN --- */
        #btn-toggle-panel {
            position: fixed; bottom: 25px; right: 20px; z-index: 999;
            background: var(--danger); color: white; border: 2px solid white;
            padding: 15px 25px; border-radius: 50px; font-weight: bold; display: none;
        }
        .sidebar {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh;
            background: white; z-index: 1000; transition: 0.4s ease-out;
            border-radius: 25px 25px 0 0; display: flex; flex-direction: column;
        }
        .sidebar.open { bottom: 0; }
        .nav-grid { display: flex; overflow-x: auto; padding: 15px; gap: 8px; background: #eee; }
        .nav-btn { min-width: 45px; height: 45px; background: white; border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex: 0 0 auto; }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn.filled { background: var(--success); color: white; }

        .options { display: flex; gap: 10px; width: 100%; max-width: 450px; padding: 20px; }
        .opt-btn { flex: 1; padding: 20px 0; border: 2px solid #ddd; border-radius: 12px; text-align: center; font-weight: bold; font-size: 22px; background: #fff; }
        .opt-btn.selected { background: var(--primary); color: white; }

        #result-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 4000; display: none; 
            flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="notif-pelanggaran">⚠️ PELANGGARAN KADETEKSI! AKTIVITAS ANJEUN KACATET!</div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="margin-top:0; color:var(--primary);">PTS 2026</h2>
            <p style="font-size:12px; color:#666;">Lebetkeun NIS kanggo ngamimitian ujian.</p>

            <div id="box-login">
                <input type="number" id="input-nis" placeholder="NIS Anjeun..." inputmode="numeric">
                <button class="btn-pro" onclick="cekSiswa()" id="btn-cek">LOGIN</button>
            </div>

            <div id="box-konfirmasi" style="display:none;">
                <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin-bottom:15px;">
                    <b id="txt-nami" style="font-size:18px;"></b>
                </div>
                <select id="mapel" onchange="$('#btn-mulai').prop('disabled', false)">
                    <option value="">-- Pilih Mapel --</option>
                    <option value="SUNDA">Basa Sunda</option>
                    <option value="SENI">Seni Budaya</option>
                </select>
                <button id="btn-mulai" class="btn-pro" disabled onclick="mulaiUjian()">MIMITIAN UJIAN</button>
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <h2 style="color:var(--success);">UJIAN RENGSE!</h2>
        <div style="font-size:60px; font-weight:800; color:var(--primary);" id="res-nilai">0</div>
        <p><b id="res-nami"></b></p>
        <p id="res-msg" style="color:red; font-weight:bold;"></p>
        <button class="btn-pro" onclick="location.reload()" style="max-width:200px;">KALUAR</button>
    </div>

    <div class="pdf-container">
        <embed id="pdf-viewer" type="application/pdf">
    </div>

    <button id="btn-toggle-panel" onclick="togglePanel()">📝 JAWAB</button>

    <div class="sidebar" id="panel-jawaban">
        <div class="nav-grid" id="nav-grid"></div>
        <div id="jawaban-area" style="flex:1; display:flex; align-items:center; justify-content:center;"></div>
        <div style="padding: 20px;">
            <button onclick="kirimJawaban()" id="btn-submit" class="btn-pro" disabled style="background:var(--success);">KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPw-5z_k6simejXhQarFcNYbP07_rSxQvAhOR8Cucv2k5qJo5gcce4Nx7i8j7XKcchNQ/exec";
        let dataMurid = {}, cheatCount = 0, totalSoal = 25;

        function cekSiswa() {
            const nis = $('#input-nis').val();
            if(!nis) return alert("Eusian NIS!");
            $('#btn-cek').prop('disabled', true).text("Mariksa...");
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + nis, function(res) {
                if(res.found) {
                    dataMurid = res; dataMurid.nis = nis;
                    $('#box-login').hide(); $('#txt-nami').text(res.nami); $('#box-konfirmasi').show();
                } else {
                    alert("NIS Teu Kapendak!"); $('#btn-cek').prop('disabled', false).text("LOGIN");
                }
            });
        }

        function mulaiUjian() {
            const mp = $('#mapel').val();
            // Fullscreen
            const el = document.documentElement;
            if(el.requestFullscreen) el.requestFullscreen();

            $('#login-overlay').fadeOut();
            $('#btn-toggle-panel').fadeIn();
            
            // GANTI PDF VIEWER LANGSUNG (LEUWIH GANCANG)
            const pdfUrl = window.location.origin + window.location.pathname.replace('index.html', '') + `pdf/${mp}.pdf`;
            $('#pdf-viewer').attr('src', pdfUrl);

            let navH = '', soalH = '';
            for(let i=1; i<=totalSoal; i++) {
                navH += `<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`;
                soalH += `<div class="soal-box" id="s-${i}" style="display:none; width:100%; text-align:center;">
                            <h3>NOMER ${i}</h3>
                            <div class="options">
                                <div class="opt-btn" onclick="pilih(${i},'A')">A</div>
                                <div class="opt-btn" onclick="pilih(${i},'B')">B</div>
                                <div class="opt-btn" onclick="pilih(${i},'C')">C</div>
                                <div class="opt-btn" onclick="pilih(${i},'D')">D</div>
                                <div class="opt-btn" onclick="pilih(${i},'E')">E</div>
                            </div>
                         </div>`;
            }
            $('#nav-grid').html(navH); $('#jawaban-area').html(soalH);
            buka(1);
        }

        function togglePanel() { $('#panel-jawaban').toggleClass('open'); }
        function buka(n) {
            $('.nav-btn').removeClass('active'); $('.soal-box').hide();
            $(`#n-${n}`).addClass('active'); $(`#s-${n}`).show();
        }

        function pilih(n, abjad) {
            $(`#s-${n} .opt-btn`).removeClass('selected');
            $(`#s-${n} .opt-btn:contains('${abjad}')`).addClass('selected');
            $(`#n-${n}`).addClass('filled');
            if($('.nav-btn.filled').length === totalSoal) $('#btn-submit').prop('disabled', false);
            if(n < totalSoal) { setTimeout(() => { togglePanel(); buka(n + 1); }, 400); }
        }

        // --- ANTI CHAT PERMANENT NOTIF ---
        window.onblur = function() {
            if(!$('#login-overlay').is(':visible') && !$('#result-overlay').is(':visible')) {
                cheatCount++;
                $('#notif-pelanggaran').slideDown(); // Notif munjul permanent
                alert("PELANGGARAN!\nAnjeun kaluar tina layar ujian!");
            }
        };

        function kirimJawaban() {
            if(!confirm("Kirim jawaban?")) return;
            let jwb = "";
            for(let i=1; i<=totalSoal; i++) { jwb += $(`#s-${i} .opt-btn.selected`).text() || "-"; }
            
            $('#btn-submit').prop('disabled', true).text("Ngirim...");
            $.post(SCRIPT_URL, {
                nami: dataMurid.nami, nis: dataMurid.nis, kelas: dataMurid.kelas,
                mapel: $('#mapel').val(), jawaban: jwb, cheat: cheatCount
            }, function(res) {
                $('#res-nami').text(dataMurid.nami);
                $('#res-nilai').text(res.nilai || "0");
                $('#res-msg').text(`Pelanggaran: ${cheatCount} kali.`);
                $('#result-overlay').fadeIn();
                $('#notif-pelanggaran').hide();
            });
        }
    </script>
</body>
</html>
