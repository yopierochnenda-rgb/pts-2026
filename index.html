<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PTS 2026 - RULES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --danger: #d93025; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }

        /* AREA PDF */
        .pdf-container { width: 100%; height: 100vh; background: #525659; position: absolute; top:0; left:0; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* PANEL JAWABAN SLIDE-UP */
        #btn-toggle-panel { position: fixed; bottom: 25px; right: 20px; z-index: 999; background: var(--danger); color: white; border: 2px solid white; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.4); cursor: pointer; display: none; }
        .sidebar { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: white; z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .sidebar.open { bottom: 0; }
        .panel-handle { width: 100%; height: 45px; background: #f1f3f4; border-radius: 30px 30px 0 0; display: flex; align-items: center; justify-content: center; }
        .handle-bar { width: 50px; height: 6px; background: #ccc; border-radius: 3px; }

        /* NAVIGASI & OPSI */
        .nav-grid { display: flex; overflow-x: auto; padding: 12px; gap: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-btn { min-width: 45px; height: 45px; background: #f1f3f4; border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex: 0 0 auto; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.filled { background: #34a853; color: white; border-color: #2d9249; }
        .options { display: flex; gap: 8px; width: 100%; max-width: 450px; padding: 0 10px; }
        .opt-btn { flex: 1; padding: 20px 0; border: 2px solid #ddd; border-radius: 15px; text-align: center; font-weight: bold; font-size: 22px; background: #fff; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* OVERLAYS */
        #login-overlay, #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2001; padding: 40px 20px; display: flex; flex-direction: column; justify-content: center; }
        select { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; font-family: inherit; appearance: none; background: #f9f9f9; }
        .btn-green { background: #1e8e3e; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .btn-green:disabled { background: #ccc; }
        .score-circle { width: 150px; height: 150px; border: 10px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; color: var(--primary); margin: 20px auto; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="text-align:center; color:var(--primary); margin-bottom:10px;">RULES</h1>
        <p style="text-align:center; color:#666; margin-bottom:30px;">Mangga pilih Kelas sarta Nami anjeun.</p>
        
        <div id="box-login">
            <select id="pilih-kelas" onchange="loadDaftarNami()">
                <option value="">-- Pilih Kelas --</option>
                <option value="7A">Kelas 7A</option>
                <option value="7B">Kelas 7B</option>
                <option value="8A">Kelas 8A</option>
                <option value="8B">Kelas 8B</option>
            </select>

            <select id="pilih-nami" style="display:none;" onchange="$('#box-mapel').fadeIn()">
                <option value="">-- Pilih Nami Anjeun --</option>
            </select>

            <div id="box-mapel" style="display:none;">
                <select id="mapel" onchange="$('#btn-mulai').prop('disabled', false)">
                    <option value="">-- Pilih Mata Pelajaran --</option>
                    <option value="SUNDA">Basa Sunda</option>
                    <option value="SENI">Seni Budaya</option>
                </select>
                <button id="btn-mulai" class="btn-green" disabled onclick="mulaiUjian()">MIMITIAN UJIAN</button>
            </div>
        </div>
    </div>

    <div id="result-overlay" style="display:none; text-align:center;">
        <h2>UJIAN RENGSE!</h2>
        <p>Hatur nuhun, <b id="res-nami"></b></p>
        <div class="score-circle" id="res-nilai">0</div>
        <p id="res-msg" style="color:#d93025; font-weight:bold;"></p>
        <button class="btn-green" onclick="location.reload()">KALUAR</button>
    </div>

    <div class="pdf-container"><iframe id="pdf-viewer"></iframe></div>
    <button id="btn-toggle-panel" onclick="togglePanel()">📝 EUSI JAWABAN</button>

    <div class="sidebar" id="panel-jawaban">
        <div class="panel-handle" onclick="togglePanel()"><div class="handle-bar"></div></div>
        <div class="nav-grid" id="nav-grid"></div>
        <div class="jawaban-area" id="jawaban-area"></div>
        <div style="padding: 10px 20px 25px;">
            <p id="msg-warning" style="color:red; font-size:12px; text-align:center; margin-bottom:8px; font-weight:bold;"></p>
            <button onclick="kirimJawaban()" id="btn-submit" class="btn-green" disabled>KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPw-5z_k6simejXhQarFcNYbP07_rSxQvAhOR8Cucv2k5qJo5gcce4Nx7i8j7XKcchNQ/exec";
        let cheatCount = 0, totalSoal = 25;

        // Ambil daptar nami dumasar kelas tina Google Sheet
        function loadDaftarNami() {
            const kls = $('#pilih-kelas').val();
            if(!kls) return;
            $('#pilih-nami').html('<option>Nuju nyandak daptar nami...</option>').show();
            
            $.getJSON(SCRIPT_URL + "?action=getSiswaByKelas&kelas=" + kls, function(res) {
                let h = '<option value="">-- Pilih Nami Anjeun --</option>';
                res.forEach(s => { h += `<option value="${s.nis}">${s.nami}</option>`; });
                $('#pilih-nami').html(h);
            });
        }

        function mulaiUjian() {
            // Aktifkeun Fullscreen
            var docEl = document.documentElement;
            if(docEl.requestFullscreen) docEl.requestFullscreen();

            $('#login-overlay').fadeOut();
            $('#btn-toggle-panel').fadeIn();
            
            const mp = $('#mapel').val();
            const pdfUrl = window.location.origin + window.location.pathname.replace('index.html', '') + `pdf/${mp}.pdf`;
            $('#pdf-viewer').attr('src', `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`);

            let navH = '', soalH = '';
            for(let i=1; i<=totalSoal; i++) {
                navH += `<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`;
                soalH += `<div class="soal-box" id="s-${i}" style="display:none; width:100%; text-align:center;">
                            <h3 style="color:var(--primary); margin-bottom:15px;">NOMER ${i}</h3>
                            <div class="options">
                                <div class="opt-btn" onclick="pilih(${i},'A')">A</div>
                                <div class="opt-btn" onclick="pilih(${i},'B')">B</div>
                                <div class="opt-btn" onclick="pilih(${i},'C')">C</div>
                                <div class="opt-btn" onclick="pilih(${i},'D')">D</div>
                                <div class="opt-btn" onclick="pilih(${i},'E')">E</div>
                            </div>
                         </div>`;
            }
            $('#nav-grid').html(navH); $('#jawaban-area').html(soalH);
            buka(1);
        }

        function togglePanel() { $('#panel-jawaban').toggleClass('open'); }
        function buka(n) {
            $('.nav-btn').removeClass('active'); $('.soal-box').hide();
            $(`#n-${n}`).addClass('active'); $(`#s-${n}`).show();
            document.getElementById(`n-${n}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function pilih(n, abjad) {
            $(`#s-${n} .opt-btn`).removeClass('selected').filter(`:contains('${abjad}')`).addClass('selected');
            $(`#n-${n}`).addClass('filled');
            const filled = $('.nav-btn.filled').length;
            if(filled === totalSoal) $('#btn-submit').prop('disabled', false);
            if(n < totalSoal) { setTimeout(() => { togglePanel(); buka(n + 1); }, 400); }
        }

        window.onblur = function() {
            if(!$('#login-overlay').is(':visible') && !$('#result-overlay').is(':visible')) {
                cheatCount++; alert("⚠️ NYONTEK KACATET!");
            }
        };

        function kirimJawaban() {
            if(!confirm("Kirim jawaban?")) return;
            let jwb = "";
            for(let i=1; i<=totalSoal; i++) { jwb += $(`#s-${i} .opt-btn.selected`).text() || "-"; }
            
            $('#btn-submit').prop('disabled', true).text("Nuju Ngirim...");
            $.post(SCRIPT_URL, {
                nis: $('#pilih-nami').val(),
                nami: $('#pilih-nami option:selected').text(),
                kelas: $('#pilih-kelas').val(),
                mapel: $('#mapel').val(),
                jawaban: jwb,
                cheat: cheatCount
            }, function(res) {
                $('#res-nami').text($('#pilih-nami option:selected').text());
                $('#res-nilai').text(res.nilai || "0");
                $('#res-msg').text(`Pindah Tab: ${cheatCount} kali.`);
                $('#result-overlay').fadeIn();
            });
        }
    </script>
</body>
</html>
