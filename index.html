<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTS 2026 - Login NIS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .pdf-container { flex: 1; background: #525659; position: relative; border-right: 2px solid #ddd; }
        iframe { width: 100%; height: 100%; border: none; }
        .sidebar { width: 380px; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 15px; background: var(--primary); color: white; text-align: center; }
        #login-form { padding: 20px; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        #ujian-container { display: none; flex-direction: column; height: 100%; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; background: #f1f3f4; border-bottom: 1px solid #ddd; }
        .nav-btn { padding: 10px 0; background: white; border: 1px solid #ccc; border-radius: 6px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.filled { background: #ceead6; border-color: #34a853; }
        .jawaban-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #fff; }
        .soal-box { display: none; width: 100%; text-align: center; padding: 20px; }
        .soal-box.active { display: block; }
        .options { display: flex; flex-direction: column; gap: 10px; padding: 0 40px; margin-top: 20px; }
        .opt-btn { padding: 15px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 18px; transition: 0.2s; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .footer { padding: 15px; border-top: 1px solid #eee; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; }
        #data-konfirmasi { display:none; margin-top:15px; }
        .aturan-box { background: #fff3cd; padding: 12px; border-radius: 8px; border-left: 4px solid #ffc107; font-size: 13px; margin-top: 10px; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: 60%; } .pdf-container { height: 40%; } }
    </style>
</head>
<body>

    <div class="pdf-container">
        <div id="pdf-msg" style="color:white; text-align:center; margin-top:30%;">PDF Soal bakal nembongan di dieu saatos milih Mapel.</div>
        <iframe id="pdf-viewer" style="display:none;"></iframe>
    </div>

    <div class="sidebar">
        <div id="login-form">
            <div class="header" style="border-radius: 8px; margin-bottom: 10px;"><h2>PTS 2026</h2></div>
            
            <div id="box-input-nis">
                <p style="font-size: 14px; color: #666;">Lebetkeun NIS anjeun:</p>
                <input type="number" id="input-nis" placeholder="Conto: 12345" required>
                <button onclick="cekSiswa()" id="btn-cek">CEK DATA SISWA</button>
            </div>

            <div id="data-konfirmasi">
                <p style="margin:0; font-size:12px; color:#555;">Wilujeng Sumping,</p>
                <h3 id="txt-nami" style="margin:5px 0; color:#1a73e8;"></h3>
                <p id="txt-kelas" style="margin:0; font-weight:bold;"></p>
                
                <label style="font-size: 13px; font-weight: bold; margin-top: 15px; display: block;">Pilih Mata Pelajaran:</label>
                <select id="mapel" onchange="tampilAturan()">
                    <option value="">-- Pilih Mapel --</option>
                    <option value="SUNDA">Basa Sunda</option>
                    <option value="SENI">Seni Budaya</option>
                </select>

                <div id="box-aturan" class="aturan-box" style="display:none;">
                    <strong style="color: #856404;">⚠️ ATURAN UJIAN:</strong>
                    <div id="teks-aturan" style="margin-top: 5px; color: #856404;"></div>
                </div>

                <button id="btn-mulai" onclick="mulaiUjian()" style="display:none; background:#1e8e3e; margin-top:15px; font-weight: bold;">MIMITIAN UJIAN</button>
            </div>
        </div>

        <div id="ujian-container">
            <div class="header"><span id="info-header"></span></div>
            <div class="nav-grid" id="nav-grid"></div>
            <div class="jawaban-area" id="jawaban-area"></div>
            <div class="footer">
                <button onclick="kirimJawaban()" id="btn-submit" style="background:#1e8e3e;">SUBMIT JAWABAN</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPw-5z_k6simejXhQarFcNYbP07_rSxQvAhOR8Cucv2k5qJo5gcce4Nx7i8j7XKcchNQ/exec";
        let cheat = 0;
        let dataMurid = {};

        function cekSiswa() {
            const nis = $('#input-nis').val();
            if(!nis) return alert("Eusian NIS heula!");
            $('#btn-cek').prop('disabled', true).text("Nuju mariksa...");
            
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + nis, function(res) {
                if(res.found) {
                    dataMurid = res; dataMurid.nis = nis;
                    $('#box-input-nis').hide();
                    $('#txt-nami').text(res.nami);
                    $('#txt-kelas').text("Kelas: " + res.kelas);
                    $('#data-konfirmasi').fadeIn();
                } else {
                    alert("NIS teu kapendak! Pariksa deui nomer NIS anjeun.");
                    $('#btn-cek').prop('disabled', false).text("CEK DATA SISWA");
                }
            });
        }

        function tampilAturan() {
            const mp = $('#mapel').val();
            const box = $('#box-aturan');
            const teks = $('#teks-aturan');
            const btn = $('#btn-mulai');
            if (!mp) { box.hide(); btn.hide(); return; }

            let info = (mp === "SUNDA") 
                ? "Ieu ujian <b>Basa Sunda</b>. Pilih jawaban nu pangmerenahna (1-5 poin). Ulah pindah tab!" 
                : "Ieu ujian <b>Seni Budaya</b>. Pilih jawaban dumasar tingkatan kaéndahan (1-5 poin). Ulah nyonték!";
            
            teks.html(`<ul style="margin:5px 0; padding-left:15px;"><li>${info}</li><li>Sadaya gerak-gerik pindah tab bakal kacatet ku Guru.</li></ul>`);
            box.fadeIn(); btn.fadeIn();
        }

        function mulaiUjian() {
            const mp = $('#mapel').val();
            $('#login-form').hide();
            $('#ujian-container').css('display', 'flex');
            $('#info-header').html(`<b>${dataMurid.nami}</b><br>${mp}`);
            $('#pdf-msg').hide();
            $('#pdf-viewer').attr('src', `pdf/${mp}.pdf`).show();

            let navH = ''; let soalH = '';
            for(let i=1; i<=25; i++) {
                navH += `<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`;
                soalH += `<div class="soal-box" id="s-${i}"><h2 style="margin-top:0">Nomer ${i}</h2><div class="options"><div class="opt-btn" onclick="pilih(${i},'A')">A</div><div class="opt-btn" onclick="pilih(${i},'B')">B</div><div class="opt-btn" onclick="pilih(${i},'C')">C</div><div class="opt-btn" onclick="pilih(${i},'D')">D</div><div class="opt-btn" onclick="pilih(${i},'E')">E</div></div></div>`;
            }
            $('#nav-grid').html(navH); $('#jawaban-area').html(soalH);
            buka(1);
            document.documentElement.requestFullscreen().catch(e => {});
        }

        function buka(n) {
            $('.nav-btn').removeClass('active'); $('.soal-box').removeClass('active');
            $(`#n-${n}`).addClass('active'); $(`#s-${n}`).addClass('active');
        }

        function pilih(n, abjad) {
            $(`#s-${n} .opt-btn`).removeClass('selected');
            $(`#s-${n} .opt-btn:contains('${abjad}')`).addClass('selected');
            $(`#n-${n}`).addClass('filled');
            if(n < 25) { setTimeout(() => { buka(n + 1); }, 300); }
        }

        window.onblur = function() {
            if($('#ujian-container').is(':visible')) {
                cheat++;
                alert("⚠️ PERHATOSAN! Ulah pindah tab atawa kaluar browser. Pagawean anjeun kacatet ku Guru!");
            }
        };

        function kirimJawaban() {
            if(!confirm("Yakin bade ngirim jawaban ayeuna?")) return;
            let jwb = "";
            for(let i=1; i<=25; i++) { jwb += $(`#s-${i} .opt-btn.selected`).text() || "-"; }
            $('#btn-submit').prop('disabled', true).text("Nuju ngirim...");
            $.post(SCRIPT_URL, {
                nami: dataMurid.nami, nis: dataMurid.nis, kelas: dataMurid.kelas,
                mapel: $('#mapel').val(), jawaban: jwb, cheat: cheat, status: "Selesai"
            }, function(r) { alert("Jawaban parantos kakirim! Hatur nuhun."); location.reload(); });
        }
    </script>
</body>
</html>
