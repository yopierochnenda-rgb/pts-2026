<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PTS 2026 - SISTEM UJIAN AMAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --danger: #ff0000; --success: #1e8e3e; --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Poppins', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* NOTIF PERMANENT PELANGGARAN */
        #notif-pelanggaran { position: fixed; top: 0; left: 0; width: 100%; background: var(--danger); color: white; text-align: center; padding: 12px; font-weight: bold; z-index: 5000; display: none; font-size: 13px; box-shadow: 0 4px 15px rgba(255,0,0,0.5); }

        /* LOGIN SCREEN */
        #login-overlay { position: fixed; inset: 0; background: var(--bg-gradient); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        input, select, .btn-pro { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 15px; border: 2px solid #eee; font-size: 16px; outline: none; }
        .btn-pro { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-pro:disabled { background: #ccc; }

        /* PDF & PANEL JAWABAN */
        .pdf-container { width: 100%; height: 100vh; background: #525659; }
        #pdf-viewer { width: 100%; height: 100%; border: none; }
        #btn-jawab { position: fixed; bottom: 25px; right: 20px; z-index: 999; background: var(--danger); color: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .sidebar { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh; background: white; z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px 30px 0 0; display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); }
        .sidebar.open { bottom: 0; }
        .nav-grid { display: flex; overflow-x: auto; padding: 15px; gap: 10px; border-bottom: 1px solid #eee; background: #fdfdfd; }
        .nav-btn { min-width: 45px; height: 45px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; cursor: pointer; }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn.filled { background: var(--success); color: white; }
        
        .opt-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .opt-row { display: flex; gap: 8px; width: 100%; max-width: 450px; }
        .opt-btn { flex: 1; padding: 20px 0; border: 2px solid #ddd; border-radius: 15px; font-weight: 800; font-size: 22px; text-align: center; background: white; transition: 0.2s; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* RESULT OVERLAY */
        #result { position: fixed; inset: 0; background: white; z-index: 6000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <div id="notif-pelanggaran">⚠️ PELANGGARAN KADETEKSI! AKTIVITAS ANJEUN KACATET KU GURU!</div>

    <div id="login-overlay">
        <div class="card">
            <h1 style="color:var(--primary); margin:0 0 10px 0;">PTS 2026</h1>
            <p style="font-size:14px; color:#666; margin-bottom:25px;">Sistem Ujian Otomatis</p>
            
            <div id="box-login">
                <input type="number" id="input-nis" placeholder="Lebetkeun NIS..." inputmode="numeric">
                <button class="btn-pro" onclick="cekSiswa()" id="btn-cek">MASUK SISTEM</button>
            </div>

            <div id="box-konfirmasi" style="display:none;">
                <div style="background:#f0f7ff; padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid #c2e0ff;">
                    <p style="margin:0; font-size:12px; color:#555;">Wilujeng sumping,</p>
                    <b id="txt-nami" style="font-size:18px; color:#111;"></b>
                </div>
                <select id="mapel" onchange="$('#btn-mulai').prop('disabled', false)">
                    <option value="">-- Pilih Mata Pelajaran --</option>
                    <option value="SUNDA">Basa Sunda</option>
                    <option value="SENI">Seni Budaya</option>
                </select>
                <button id="btn-mulai" class="btn-pro" disabled onclick="mulaiUjian()">MIMITIAN UJIAN</button>
            </div>
        </div>
    </div>

    <div id="result">
        <h2 id="res-title">HASIL UJIAN</h2>
        <div id="p-skor" style="font-size: 85px; font-weight: 800; margin: 10px 0;">0</div>
        <p><b id="p-nami" style="font-size: 18px;"></b></p>
        <p id="res-msg" style="margin: 10px 0 30px 0; padding: 0 20px; font-size: 15px;"></p>
        <button id="btn-hasil-aksi" class="btn-pro" style="max-width:280px;"></button>
    </div>

    <div class="pdf-container"><iframe id="pdf-viewer" src="about:blank"></iframe></div>
    <button id="btn-jawab" onclick="$('.sidebar').toggleClass('open')">📝 JAWAB</button>

    <div class="sidebar">
        <div style="height:40px; display:flex; align-items:center; justify-content:center;" onclick="$('.sidebar').removeClass('open')">
            <div style="width:40px; height:4px; background:#ccc; border-radius:2px;"></div>
        </div>
        <div class="nav-grid" id="nav"></div>
        <div class="opt-area">
            <h3 id="nomer-aktif" style="margin:0 0 15px 0; color:var(--primary);">Nomer 1</h3>
            <div class="opt-row" id="opt"></div>
        </div>
        <div style="padding: 20px 30px 40px;">
            <button id="btn-kirim" class="btn-pro" disabled onclick="kirimJawaban()" style="background:var(--success); margin:0;">KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyqxLqX1pE1dbyRdj48UuP9xjRkj3VT-JZ-yV09KZsV1IcFhtsJ1Ph9ePLsFNt3zw1nA/exec";
        let user = {}, cheats = 0, totalSoal = 25;

        function cekSiswa() {
            const nis = $('#input-nis').val();
            if(!nis) return alert("Eusian NIS!");
            $('#btn-cek').prop('disabled', true).text("Mariksa...");
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + nis, function(res) {
                if(res.found) {
                    user = res; user.nis = nis;
                    $('#box-login').hide(); $('#txt-nami').text(res.nami); $('#box-konfirmasi').fadeIn();
                } else {
                    alert("NIS Teu Kapendak!"); $('#btn-cek').prop('disabled', false).text("MASUK SISTEM");
                }
            });
        }

        function mulaiUjian() {
            const mp = $('#mapel').val();
            if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            $('#login-overlay').fadeOut();
            
            const pdfUrl = window.location.origin + window.location.pathname.replace('index.html','') + `pdf/${mp}.pdf`;
            $('#pdf-viewer').attr('src', `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`);
            
            let navH = ''; 
            for(let i=1; i<=totalSoal; i++) {
                navH += `<div class="nav-btn" id="n-${i}" onclick="bukaSoal(${i})">${i}</div>`;
            }
            $('#nav').html(navH); 
            bukaSoal(1);
        }

        function bukaSoal(n) {
            $('.nav-btn').removeClass('active'); 
            $(`#n-${n}`).addClass('active');
            $('#nomer-aktif').text("Nomer " + n);
            
            let h = '';
            ['A','B','C','D','E'].forEach(v => {
                let sel = ($(`#n-${n}`).data('ans') == v) ? 'selected' : '';
                h += `<div class="opt-btn ${sel}" onclick="pilihJawaban(${n},'${v}')">${v}</div>`;
            });
            $('#opt').html(h);
            document.getElementById(`n-${n}`).scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function pilihJawaban(n, v) {
            $(`#n-${n}`).addClass('filled').data('ans', v);
            $('.opt-btn').removeClass('selected');
            $(`.opt-btn:contains(${v})`).addClass('selected');
            
            if($('.nav-btn.filled').length == totalSoal) $('#btn-kirim').prop('disabled', false);
            if(n < totalSoal) setTimeout(() => bukaSoal(n+1), 300);
        }

        window.onblur = function() {
            if(!$('#login-overlay').is(':visible') && !$('#result').is(':visible')) {
                cheats++;
                $('#notif-pelanggaran').slideDown();
                alert("⚠️ PELANGGARAN!\nUlah muka aplikasi sanes!\nAktivitas anjeun parantos kacatet.");
            }
        };

        function kirimJawaban() {
            if(!confirm("Yakin bade dikirim ayeuna?")) return;
            let jwb = ""; 
            for(let i=1; i<=totalSoal; i++) { jwb += $(`#n-${i}`).data('ans') || "-"; }
            
            $('#btn-kirim').prop('disabled', true).text("Nuju Ngirim...");
            
            $.post(SCRIPT_URL, {
                nami: user.nami, nis: user.nis, kelas: user.kelas,
                mapel: $('#mapel').val(), jawaban: jwb, cheat: cheats
            }, function(res) {
                let data = (typeof res === 'object') ? res : JSON.parse(res);
                let skor = parseInt(data.peunteun);
                
                $('#p-skor').text(skor);
                $('#p-nami').text(user.nami);

                // LOGIKA KKM 85
                if (skor < 85) {
                    $('#res-title').text("HAMPURA, TEU LULUS!").css('color', 'red');
                    $('#p-skor').css('color', 'red');
                    $('#res-msg').html(`<b style="color:red">Peunteun anjeun ${skor}, sahandapeun 85.<br>Mangga balikan deui ujianana nepi ka lulus!</b>`);
                    $('#btn-hasil-aksi').text("REMIDIAL / BALIKAN DEUI").attr('onclick', 'location.reload()').css('background', 'var(--danger)');
                } else {
                    $('#res-title').text("WILUJENG, ANJEUN LULUS!").css('color', 'green');
                    $('#p-skor').css('color', 'var(--primary)');
                    $('#res-msg').html(`<b style="color:green">Alhamdulillah! Peunteun anjeun parantos cekap.</b>`);
                    $('#btn-hasil-aksi').text("KALUAR SISTEM").attr('onclick', 'location.reload()').css('background', 'var(--primary)');
                }

                $('#result').fadeIn().css('display','flex');
                if(document.exitFullscreen) document.exitFullscreen();
            });
        }
    </script>
</body>
</html>
