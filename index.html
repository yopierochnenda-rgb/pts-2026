<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PTS 2026 - RULES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a73e8; 
            --primary-dark: #1557b0;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --danger: #d93025;
            --success: #1e8e3e;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }

        /* --- TAMPILAN LOGIN PRO --- */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient); 
            z-index: 2001; padding: 20px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .brand-logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .login-subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }

        input[type="number"], select {
            width: 100%; padding: 16px; margin-bottom: 15px;
            border: 2px solid #eee; border-radius: 16px;
            font-size: 16px; font-family: inherit; outline: none;
            transition: 0.3s; background: #fdfdfd; text-align: center;
        }

        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(26,115,232,0.1); }

        .btn-pro {
            background: var(--primary); color: white; border: none; padding: 18px;
            width: 100%; border-radius: 16px; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(26,115,232,0.2);
        }

        .btn-pro:active { transform: scale(0.98); }
        .btn-pro:disabled { background: #ccc; box-shadow: none; }

        .info-box {
            background: #f0f7ff; padding: 20px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid #c2e0ff;
        }

        /* --- AREA UTAMA UJIAN --- */
        .pdf-container { width: 100%; height: 100vh; background: #525659; position: absolute; top:0; left:0; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-toggle-panel {
            position: fixed; bottom: 25px; right: 20px; z-index: 999;
            background: var(--danger); color: white; border: 2px solid white;
            padding: 15px 25px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none;
        }

        .sidebar {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: white; z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 35px 35px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }
        .sidebar.open { bottom: 0; }

        .panel-handle { width: 100%; height: 45px; background: #f1f3f4; border-radius: 35px 35px 0 0; display: flex; align-items: center; justify-content: center; }
        .handle-bar { width: 50px; height: 6px; background: #ccc; border-radius: 3px; }

        .nav-grid { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-btn { min-width: 48px; height: 48px; background: #f1f3f4; border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex: 0 0 auto; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.filled { background: var(--success); color: white; border-color: #166e2f; }

        .jawaban-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .options { display: flex; gap: 10px; width: 100%; max-width: 450px; padding: 0 15px; }
        .opt-btn { flex: 1; padding: 22px 0; border: 2px solid #ddd; border-radius: 18px; text-align: center; font-weight: bold; font-size: 24px; background: #fff; transition: 0.2s; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(0.95); }

        /* --- RESULT OVERLAY --- */
        #result-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 2002; display: none; 
            flex-direction: column; justify-content: center; align-items: center; padding: 30px;
        }
        .score-circle { width: 160px; height: 160px; border: 12px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 55px; font-weight: 800; color: var(--primary); margin: 25px 0; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <div class="brand-logo">RULES</div>
            <div class="login-subtitle">Penilaian Tengah Semester 2026</div>

            <div id="box-login">
                <input type="number" id="input-nis" placeholder="Lebetkeun NIS Anjeun..." inputmode="numeric">
                <button class="btn-pro" onclick="cekSiswa()" id="btn-cek">MASUK SISTEM</button>
            </div>

            <div id="box-konfirmasi" style="display:none;">
                <div class="info-box">
                    <p style="font-size:13px; color:#555; margin:0;">Wilujeng sumping,</p>
                    <b id="txt-nami" style="font-size:20px; color:#111;"></b>
                </div>
                <select id="mapel" onchange="$('#btn-mulai').prop('disabled', false)">
                    <option value="">-- Pilih Mata Pelajaran --</option>
                    <option value="SUNDA">Basa Sunda</option>
                    <option value="SENI">Seni Budaya</option>
                </select>
                <button id="btn-mulai" class="btn-pro" disabled onclick="mulaiUjian()" style="margin-top:10px;">MIMITIAN UJIAN</button>
            </div>
            <p style="margin-top: 30px; font-size: 11px; color: #aaa;">&copy; 2026 RULES Examination System</p>
        </div>
    </div>

    <div id="result-overlay">
        <h2 style="color: var(--success); margin:0;">UJIAN RENGSE!</h2>
        <div class="score-circle" id="res-nilai">0</div>
        <p style="font-size: 18px; margin:0;"><b id="res-nami"></b></p>
        <p id="res-msg" style="color:#d93025; font-weight:bold; margin-top:15px; font-size:13px;"></p>
        <button class="btn-pro" onclick="location.reload()" style="max-width:200px; margin-top:20px;">KALUAR</button>
    </div>

    <div class="pdf-container">
        <iframe id="pdf-viewer"></iframe>
    </div>

    <button id="btn-toggle-panel" onclick="togglePanel()">📝 JAWAB</button>

    <div class="sidebar" id="panel-jawaban">
        <div class="panel-handle" onclick="togglePanel()"><div class="handle-bar"></div></div>
        <div class="nav-grid" id="nav-grid"></div>
        <div class="jawaban-area" id="jawaban-area"></div>
        <div style="padding: 15px 30px 30px;">
            <p id="msg-warning" style="color:red; font-size:12px; text-align:center; margin-bottom:10px; font-weight:600;"></p>
            <button onclick="kirimJawaban()" id="btn-submit" class="btn-pro" disabled style="background: var(--success);">KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPw-5z_k6simejXhQarFcNYbP07_rSxQvAhOR8Cucv2k5qJo5gcce4Nx7i8j7XKcchNQ/exec";
        let dataMurid = {}, cheatCount = 0, totalSoal = 25;

        function cekSiswa() {
            const nis = $('#input-nis').val();
            if(!nis) return alert("Eusian NIS!");
            $('#btn-cek').prop('disabled', true).text("Nuju Mariksa...");
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + nis, function(res) {
                if(res.found) {
                    dataMurid = res; dataMurid.nis = nis;
                    $('#box-login').hide(); $('#txt-nami').text(res.nami); $('#box-konfirmasi').fadeIn();
                } else {
                    alert("NIS Teu Kapendak!"); $('#btn-cek').prop('disabled', false).text("MASUK SISTEM");
                }
            }).fail(function() {
                alert("Gagal nyambung ka server!"); $('#btn-cek').prop('disabled', false).text("MASUK SISTEM");
            });
        }

        function mulaiUjian() {
            // Fullscreen mode
            const el = document.documentElement;
            if(el.requestFullscreen) el.requestFullscreen();
            else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();

            $('#login-overlay').fadeOut();
            $('#btn-toggle-panel').fadeIn();
            
            const mp = $('#mapel').val();
            const pdfUrl = window.location.origin + window.location.pathname.replace('index.html', '') + `pdf/${mp}.pdf`;
            $('#pdf-viewer').attr('src', `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`);

            let navH = '', soalH = '';
            for(let i=1; i<=totalSoal; i++) {
                navH += `<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`;
                soalH += `<div class="soal-box" id="s-${i}" style="display:none; width:100%; text-align:center;">
                            <h3 style="margin-bottom:20px; color:var(--primary);">SOAL NOMER ${i}</h3>
                            <div class="options">
                                <div class="opt-btn" onclick="pilih(${i},'A')">A</div>
                                <div class="opt-btn" onclick="pilih(${i},'B')">B</div>
                                <div class="opt-btn" onclick="pilih(${i},'C')">C</div>
                                <div class="opt-btn" onclick="pilih(${i},'D')">D</div>
                                <div class="opt-btn" onclick="pilih(${i},'E')">E</div>
                            </div>
                         </div>`;
            }
            $('#nav-grid').html(navH); $('#jawaban-area').html(soalH);
            buka(1);
        }

        function togglePanel() { $('#panel-jawaban').toggleClass('open'); }
        function buka(n) {
            $('.nav-btn').removeClass('active'); $('.soal-box').hide();
            $(`#n-${n}`).addClass('active'); $(`#s-${n}`).show();
            document.getElementById(`n-${n}`).scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function pilih(n, abjad) {
            $(`#s-${n} .opt-btn`).removeClass('selected');
            $(`#s-${n} .opt-btn:contains('${abjad}')`).addClass('selected');
            $(`#n-${n}`).addClass('filled');
            checkCompletion();
            if(n < totalSoal) { setTimeout(() => { togglePanel(); buka(n + 1); }, 400); }
        }

        function checkCompletion() {
            const filled = $('.nav-btn.filled').length;
            if(filled === totalSoal) {
                $('#btn-submit').prop('disabled', false);
                $('#msg-warning').text("");
            } else {
                $('#msg-warning').text(`${totalSoal - filled} nomer deui anu acan dieusi.`);
            }
        }

        window.onblur = function() {
            if(!$('#login-overlay').is(':visible') && !$('#result-overlay').is(':visible')) {
                cheatCount++;
                console.log("Cheat Count: " + cheatCount);
            }
        };

        function kirimJawaban() {
            if(!confirm("Yakin bade dikirim?")) return;
            let jwb = "";
            for(let i=1; i<=totalSoal; i++) { jwb += $(`#s-${i} .opt-btn.selected`).text() || "-"; }
            
            $('#btn-submit').prop('disabled', true).text("Nuju Ngirim...");
            
            $.post(SCRIPT_URL, {
                nami: dataMurid.nami, nis: dataMurid.nis, kelas: dataMurid.kelas,
                mapel: $('#mapel').val(), jawaban: jwb, cheat: cheatCount
            }, function(res) {
                $('#res-nami').text(dataMurid.nami);
                $('#res-nilai').text(res.nilai || "0");
                $('#res-msg').text(`Catetan: Pindah Tab/Apps ${cheatCount} kali.`);
                $('#result-overlay').fadeIn();
                if(document.exitFullscreen) document.exitFullscreen();
            }).fail(function() {
                alert("Gagal ngirim! Cek sinyal internet.");
                $('#btn-submit').prop('disabled', false).text("KIRIM JAWABAN");
            });
        }
    </script>
</body>
</html>
