<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTS 2026 - RULES BRAND</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --danger: #ff0000; --success: #1e8e3e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Poppins', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* NOTIF PELANGGARAN */
        #notif-p { position: fixed; top: 0; width: 100%; background: var(--danger); color: white; text-align: center; padding: 12px; z-index: 5000; display: none; font-weight: bold; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* LOGIN SCREEN */
        #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        input, select, .btn-pro { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 16px; outline: none; }
        .btn-pro { background: var(--primary); color: white; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-pro:active { transform: scale(0.95); }

        /* PDF & JAWABAN */
        .pdf-container { width: 100%; height: 100vh; background: #525659; }
        #pdf-viewer { width: 100%; height: 100%; border: none; }
        #btn-jawab { position: fixed; bottom: 25px; right: 20px; z-index: 999; background: var(--danger); color: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .sidebar { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: white; z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 25px 25px 0 0; display: flex; flex-direction: column; }
        .sidebar.open { bottom: 0; }
        .nav-grid { display: flex; overflow-x: auto; padding: 15px; gap: 10px; border-bottom: 1px solid #eee; }
        .nav-btn { min-width: 45px; height: 45px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn.filled { background: var(--success); color: white; }
        
        .opt-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .opt-row { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .opt-btn { flex: 1; padding: 18px 0; border: 2px solid #ddd; border-radius: 12px; font-weight: 800; font-size: 22px; text-align: center; background: white; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* LAYAR HASIL */
        #result { position: fixed; inset: 0; background: white; z-index: 6000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <div id="notif-p">⚠️ PELANGGARAN! AKTIVITAS ANJEUN KACATET KU GURU!</div>

    <div id="login-overlay">
        <div class="card">
            <h1 style="color:var(--primary); margin:0 0 10px 0;">RULES EXAM</h1>
            <p style="font-size:12px; color:#666; margin-bottom:25px;">Pastikeun NIS anjeun leres</p>
            
            <div id="box-login">
                <input type="number" id="nis" placeholder="Lebetkeun NIS..." inputmode="numeric">
                <button class="btn-pro" onclick="cekSiswa()" id="btn-cek">MASUK SISTEM</button>
            </div>

            <div id="box-mulai" style="display:none;">
                <div style="background:#f0f7ff; padding:15px; border-radius:15px; margin-bottom:15px;">
                    <p style="margin:0; font-size:12px; color:#555;">Wilujeng Sumping,</p>
                    <b id="nami-txt" style="font-size:18px;"></b>
                </div>
                <select id="mapel">
                    <option value="SUNDA">Basa Sunda</option>
                    <option value="SENI">Seni Budaya</option>
                </select>
                <button class="btn-pro" onclick="mulai()">MIMITIAN UJIAN</button>
            </div>
        </div>
    </div>

    <div id="result">
        <h2 id="res-h" style="margin:0;">HASIL UJIAN</h2>
        <h1 id="res-skor" style="font-size: 90px; margin:10px 0;">0</h1>
        <p><b id="res-nami"></b></p>
        <p id="res-msg" style="margin-bottom:30px;"></p>
        <button id="res-btn" class="btn-pro" style="max-width:280px;" onclick="location.reload()">KALUAR</button>
    </div>

    <div class="pdf-container"><iframe id="pdf-viewer"></iframe></div>
    <button id="btn-jawab" onclick="$('.sidebar').toggleClass('open')">📝 JAWABAN</button>

    <div class="sidebar">
        <div style="padding:10px; text-align:center" onclick="$('.sidebar').removeClass('open')">
            <div style="width:40px; height:5px; background:#ddd; border-radius:10px; display:inline-block"></div>
        </div>
        <div class="nav-grid" id="nav"></div>
        <div class="opt-area">
            <h3 id="no-txt" style="margin:0 0 15px 0; color:var(--primary);">Nomer 1</h3>
            <div class="opt-row" id="opt"></div>
        </div>
        <div style="padding: 20px 30px 40px;">
            <button id="btn-kirim" class="btn-pro" disabled onclick="kirim()" style="background:var(--success); margin:0;">KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxt4q39DUbf6HkvOTzxnl5RBiLKaP5NIQrqPXhZ7hOcb2V5YGZY-NZaqy16Hrr-IVNkkw/exec";
        let user = {}, cheats = 0, total = 25;

        // LOGIN FAST (OPTIMIZED)
        function cekSiswa() {
            const val = $('#nis').val();
            if(!val) return alert("Eusian NIS!");
            $('#btn-cek').prop('disabled', true).text("Mariksa...");
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + val, res => {
                if(res.found) {
                    user = res; user.nis = val;
                    $('#box-login').hide(); $('#nami-txt').text(res.nami); $('#box-mulai').fadeIn();
                } else {
                    alert("NIS Teu Kapendak!"); $('#btn-cek').prop('disabled', false).text("MASUK SISTEM");
                }
            });
        }

        // MULAI & FIX PDF VIEW
        function mulai() {
            if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            $('#login-overlay').fadeOut();
            const mp = $('#mapel').val();
            
            // Trik sangkan PDF bisa dibuka dina mode mobile biasa
            const pdfUrl = window.location.origin + window.location.pathname.replace('index.html','') + `pdf/${mp}.pdf`;
            $('#pdf-viewer').attr('src', `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`);
            
            let h = ''; for(let i=1; i<=total; i++) h += `<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`;
            $('#nav').html(h); buka(1);
        }

        function buka(n) {
            $('.nav-btn').removeClass('active'); $(`#n-${n}`).addClass('active');
            $('#no-txt').text("Nomer " + n);
            let h = ''; ['A','B','C','D','E'].forEach(v => {
                let sel = ($(`#n-${n}`).data('ans') == v) ? 'selected' : '';
                h += `<div class="opt-btn ${sel}" onclick="pilih(${n},'${v}')">${v}</div>`;
            });
            $('#opt').html(h);
            document.getElementById(`n-${n}`).scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function pilih(n, v) {
            $(`#n-${n}`).addClass('filled').data('ans', v);
            $('.opt-btn').removeClass('selected'); $(`.opt-btn:contains(${v})`).addClass('selected');
            if($('.filled').length == total) $('#btn-kirim').prop('disabled', false);
            if(n < total) setTimeout(() => buka(n+1), 300);
        }

        // SENSOR ANTI-CHEAT
        window.onblur = () => {
            if(!$('#login-overlay').is(':visible') && !$('#result').is(':visible')) {
                cheats++; $('#notif-p').slideDown(); alert("ULAH PINDAH TAB!");
            }
        };

        // KIRIM (FIX BUG NOTIF PELANGGARAN)
        function kirim() {
            if(!confirm("Yakin bade dikirim?")) return;
            
            // PAREUMAN SENSOR SATEUCAN NGIRIM
            window.onblur = null;
            $('#notif-p').hide();

            let j = ""; for(let i=1; i<=total; i++) j += $(`#n-${i}`).data('ans') || "-";
            $('#btn-kirim').prop('disabled', true).text("Nuju Ngirim...");

            $.post(SCRIPT_URL, {
                nami: user.nami, nis: user.nis, kelas: user.kelas,
                mapel: $('#mapel').val(), jawaban: j, cheat: cheats
            }, function(res) {
                let data = (typeof res === 'object') ? res : JSON.parse(res);
                let skor = parseInt(data.peunteun);
                
                $('#res-skor').text(skor); $('#res-nami').text(user.nami);

                // LOGIKA KKM 85
                if(skor < 85) {
                    $('#res-h').text("HAMPURA, TEU LULUS!").css('color','red');
                    $('#res-skor').css('color','red');
                    $('#res-msg').html(`<b style="color:red">Peunteun anjeun ${skor}, sahandapeun 85.<br>Mangga balikan deui ujianana!</b>`);
                    $('#res-btn').text("REMIDIAL / BALIKAN DEUI").css('background','var(--danger)');
                } else {
                    $('#res-h').text("WILUJENG, ANJEUN LULUS!").css('color','green');
                    $('#res-skor').css('color','var(--primary)');
                    $('#res-msg').html(`<b style="color:green">Wilujeng! Peunteun anjeun parantos cekap.</b>`);
                    $('#res-btn').text("KALUAR SISTEM").css('background','var(--primary)');
                }

                $('#result').fadeIn().css('display','flex');
                if(document.exitFullscreen) document.exitFullscreen();
            });
        }
    </script>
</body>
</html>
