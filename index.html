<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ujian Online RULES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; }
        .card { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        .nav-btn { width: 40px; height: 40px; border-radius: 50%; background: #eee; display: inline-flex; align-items: center; justify-content: center; margin: 5px; cursor: pointer; }
        .nav-btn.active { border: 2px solid green; }
        .nav-btn.filled { background: green; color: white; }
        #btn-kirim { width: 100%; padding: 15px; background: red; color: white; border: none; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="card" id="login-box">
        <h3>Login Siswa</h3>
        <input type="text" id="nis" placeholder="Masukkan NIS..." style="width:100%; padding:10px;">
        <button onclick="cekSiswa()" style="width:100%; padding:10px; margin-top:10px;">MASUK</button>
    </div>

    <div class="card" id="ujian-box" style="display:none;">
        <img id="img-soal" style="width:100%;">
        <div id="nav-container"></div>
        <div style="display:flex; justify-content:space-around; margin:20px 0;">
            <button onclick="pilih('A')">A</button><button onclick="pilih('B')">B</button>
            <button onclick="pilih('C')">C</button><button onclick="pilih('D')">D</button>
            <button onclick="pilih('E')">E</button>
        </div>
        <button id="btn-kirim" onclick="kirim()">KIRIM JAWABAN</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUFlEN_WAo4l90YYtXE8AnADYzfSgGIgbv_9FA87OL4CLBigCZqrPMx8NFQksSDh7svQ/exec";
    let user = {}, currentNo = 1, answers = {}, cheats = 0;

    for(let i=1; i<=25; i++) $('#nav-container').append(`<div class="nav-btn" id="n-${i}" onclick="buka(${i})">${i}</div>`);

    function cekSiswa() {
        $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + $('#nis').val(), res => {
            if(res.found) { user = res; user.nis = $('#nis').val(); $('#login-box').hide(); $('#ujian-box').show(); buka(1); }
            else alert("NIS Teu Kapendak!");
        });
    }

    function buka(n) {
        currentNo = n;
        $('.nav-btn').removeClass('active'); $(`#n-${n}`).addClass('active');
        $('#img-soal').attr('src', `https://raw.githubusercontent.com/yopierochnenda-rgb/pts-2026/main/seni-${n}.jpg`);
    }

    function pilih(opsi) {
        answers[currentNo] = opsi;
        $(`#n-${currentNo}`).addClass('filled');
        if(Object.keys(answers).length == 25) $('#btn-kirim').show();
    }

    $(window).blur(() => { if($('#ujian-box').is(':visible')) cheats++; });

    function kirim() {
        let jwb = Object.values(answers).join("-");
        $.ajax({
            url: SCRIPT_URL, method: "POST",
            data: { action: 'kirimJawaban', nami: user.nami, nis: user.nis, kelas: user.kelas, mapel: 'SENI', jawaban: jwb, cheat: cheats },
            success: (res) => {
                let data = JSON.parse(res);
                alert(data.nilai >= 85 ? "Lulus! Skor: " + data.nilai : "Remedial! Skor: " + data.nilai);
                location.reload();
            }
        });
    }
</script>
</body>
</html>
