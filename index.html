<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <title>PTS 2026 - RULES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #333; margin: 0; }
        
        /* LAYAR TUTUP (DITAMBAHKEUN LAYOUT KHUSUS) */
        #layar-tutup { 
            display: none; height: 100vh; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: #222; color: white; text-align: center; 
        }
        #layar-tutup h1 { color: #ff0000; font-size: 3em; }
        
        /* LOGIN & SOAL (DESAIN TI HEULA) */
        #login-container, #soal-container { padding: 20px; text-align: center; color: white; }
        .soal-img { width: 100%; max-width: 600px; display: block; margin: 10px auto; }
    </style>
</head>
<body>

    <div id="layar-tutup">
        <h1>UJIAN PARANTOS RENGSE</h1>
        <p>Waktos ujian parantos seep.</p>
        <p>Mangga hubungi guru mapel:</p>
        <a href="https://wa.me/6282126545204" style="color:yellow; font-size: 20px;">082126545204</a>
    </div>

    <div id="login-container">
        <h1>LOGIN PESERTA</h1>
        <input type="number" id="nis" placeholder="Lebetkeun NIS...">
        <button onclick="cekSiswa()">MASUK</button>
    </div>

    <div id="soal-container" style="display:none;">
        <div id="tampilan-soal"></div>
        <button onclick="alert('Jawaban dikirim!')">KIRIM JAWABAN</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrAW18mZUvtlNjecdV1vfhKhVMgTg7mVveyvCTlhVv6iYD8cyxzeGaFpQyUDn7NYctfA/exec";

        // LOGIKA KUNCI OTOMATIS
        $(document).ready(function() {
            $.getJSON(SCRIPT_URL + "?action=getStatus", res => {
                if(res.status === "tutup") {
                    $('#layar-tutup').css('display', 'flex');
                    $('#login-container').hide();
                }
            });
        });

        function cekSiswa() {
            const nis = $('#nis').val();
            $.getJSON(SCRIPT_URL + "?action=checkNIS&nis=" + nis, res => {
                if(res.found) {
                    $('#login-container').hide();
                    $('#soal-container').show();
                    // Load gambar soal
                    let h = "";
                    for(let i=1; i<=5; i++) h += `<img src="sunda-${i}.jpg" class="soal-img">`;
                    $('#tampilan-soal').html(h);
                } else {
                    alert("NIS Teu Kapendak!");
                }
            });
        }
    </script>
</body>
</html>
