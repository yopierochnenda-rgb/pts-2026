<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - RULES</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; padding: 50px; }
        .card { background: #333; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; margin: auto; border: 1px solid #444; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 10px 0; width: 100%; transition: 0.3s; color: white; font-weight: bold; }
        .btn-buka { background: #28a745; }
        .btn-tutup { background: #dc3545; }
        button:disabled { background: #555; cursor: not-allowed; }
        h1 { margin-bottom: 30px; color: #1a73e8; }
    </style>
</head>
<body>

    <div class="card">
        <h1>ADMIN PANEL</h1>
        <p>Kontrol Status Login Siswa:</p>
        
        <button class="btn-buka" onclick="updateStatus('buka', this)">BUKA LOGIN SISWA</button>
        <button class="btn-tutup" onclick="updateStatus('tutup', this)">TUTUP LOGIN SISWA</button>
        
        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
        <p style="font-size: 12px; color: #888;">RULES BRAND - 2026</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrAW18mZUvtlNjecdV1vfhKhVMgTg7mVveyvCTlhVv6iYD8cyxzeGaFpQyUDn7NYctfA/exec";

        async function updateStatus(status, btn) {
            let pass = prompt("Lebetkeun Sandi Admin:");
            if (pass !== "Rules2026") { 
                alert("Sandi Salah!"); 
                return; 
            }
            
            // Indikator loading
            btn.innerText = "Nuju Ngapdet...";
            btn.disabled = true;
            
            try {
                // Ngirim data nganggo fetch
                await fetch(SCRIPT_URL + "?action=setStatus&status=" + status, {
                    method: 'POST',
                    mode: 'no-cors'
                });
                
                // Tunda sakedap supados server Google nampi datana
                alert("Status tos robah janten: " + status.toUpperCase());
                location.reload();
            } catch (err) {
                // Sanajan error dina CORS, biasana data geus asup ka Sheets
                alert("Status parantos dikirim ka sistem.");
                location.reload();
            }
        }
    </script>
</body>
</html>
