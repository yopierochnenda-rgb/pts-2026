<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - RULES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; padding: 50px; }
        .card { background: #333; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; margin: auto; border: 1px solid #444; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 10px; width: 100%; transition: 0.3s; }
        .btn-buka { background: #28a745; color: white; }
        .btn-tutup { background: #dc3545; color: white; }
        button:hover { opacity: 0.8; }
        h1 { margin-bottom: 30px; color: #1a73e8; }
    </style>
</head>
<body>

    <div class="card">
        <h1>ADMIN PANEL</h1>
        <p>Kontrol Status Login Siswa:</p>
        
        <button class="btn-buka" onclick="updateStatus('buka')">BUKA LOGIN SISWA</button>
        <button class="btn-tutup" onclick="updateStatus('tutup')">TUTUP LOGIN SISWA</button>
        
        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
        <p style="font-size: 12px; color: #888;">RULES BRAND - 2026</p>
    </div>

    <script>
        // PASTIKAN LINK SAMA DENGAN INDEX.HTML
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrAW18mZUvtlNjecdV1vfhKhVMgTg7mVveyvCTlhVv6iYD8cyxzeGaFpQyUDn7NYctfA/exec";

        function updateStatus(status) {
            let pass = prompt("Lebetkeun Sandi Admin:");
            if (pass !== "Rules2026") { 
                alert("Sandi Salah!"); 
                return; 
            }
            
            // Animasi sakedap
            alert("Nuju ngapdet status...");
            
            $.post(SCRIPT_URL + "?action=setStatus&status=" + status, res => {
                alert("Status Login Siswa ayeuna: " + status.toUpperCase());
                location.reload();
            });
        }
    </script>
</body>
</html>
